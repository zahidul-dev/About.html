<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        
     table {
        border-collapse: collapse;
        width: 100%;
     }
     th, td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
     }
     th {
        background-color: #f2f2f2;
     }

    </style>
</head>
<body>
    <main>
        <h2>Table HTML</h2>
        <table>
            <caption>Data for players</caption>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Team</th>
                    <th>Position</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Messi</td>
                    <td>PSG</td>
                    <td>Forward</td>
                </tr>
                <tr>
                    <td>Ronaldo</td>
                    <td>Al Nassr</td>
                    <td>Forward</td>
                </tr>
                <tr>
                    <td>Neuer</td>
                    <td>Bayern Munich</td>
                    <td>Goalkeeper</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3">By Fifa Brother</td>
                </tr>
            </tfoot>
        </table>
        <ul>
            <li>table: table</li>
            <li>table head: thead</li>
            <li>table body: tbody</li>
            <li>table row: tr</li>
            <li>table data: td</li>
            <li>table header data: th</li>
            <li>table footer: tfooter</li>
        </ul>
    </main>
</body>
</html>
